services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Tarayıcıdan API'ye gidecek adres (backend aynı makinede ise localhost yerine host IP veya servis adı kullanın)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"   # http://localhost:3000 — istersen "5173:80" yap
    restart: unless-stopped
